<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RMD decor | Корзина</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="/">RMD decor</a>
        <nav class="nav">
          <a href="/">Главная</a>
          <a href="/catalog">Каталог</a>
          <a class="active" href="/cart">Корзина <span class="cart-badge" id="cart-count">0</span></a>
          <a href="/account">Кабинет</a>
          <a href="/orders-history">Заказы</a>
          <a href="/admin-login">Админ</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Корзина</p>
            <h1>Ваш заказ</h1>
          </div>
        </div>

        <div class="cart-layout">
          <section class="cart-list" id="cart-items">
            <p>Загрузка корзины...</p>
          </section>

          <aside class="summary-card">
            <h2>Итог</h2>
            <div class="summary-row">
              <span>Товаров</span>
              <span id="summary-count">0</span>
            </div>
            <div class="summary-row total-row">
              <span>Сумма</span>
              <span id="summary-total">0 ₽</span>
            </div>
            <a class="button button-primary full-width" href="/checkout">Оформить заказ</a>
          </aside>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <h3>RMD decor</h3>
        </div>
        <p></p>
      </div>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/cart.js"></script>
  </body>
</html>
