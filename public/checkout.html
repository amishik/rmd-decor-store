<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RMD decor | Оформление заказа</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="/">RMD decor</a>
        <nav class="nav">
          <a href="/">Главная</a>
          <a href="/catalog">Каталог</a>
          <a href="/cart">Корзина <span class="cart-badge" id="cart-count">0</span></a>
          <a href="/account">Кабинет</a>
          <a href="/orders-history">Заказы</a>
          <a href="/admin-login">Админ</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Оформление</p>
            <h1>Данные для заказа</h1>
          </div>
        </div>

        <div class="checkout-layout">
          <form class="checkout-form" id="checkout-form">
            <div class="form-grid">
              <label>
                <span>ФИО</span>
                <input type="text" id="full-name" required />
              </label>
              <label>
                <span>Email</span>
                <input type="email" id="email" required />
              </label>
              <label>
                <span>Телефон</span>
                <input type="tel" id="phone" required />
              </label>
              <label>
                <span>Город</span>
                <input type="text" id="city" required />
              </label>
              <label class="full-span">
                <span>Адрес</span>
                <input type="text" id="street-address" required />
              </label>
              <label class="full-span">
                <span>Комментарий</span>
                <textarea id="notes" rows="4" placeholder="Комментарий к доставке"></textarea>
              </label>
            </div>
            <button class="button button-primary" type="submit">Подтвердить заказ</button>
            <p class="form-message" id="checkout-message"></p>
          </form>

          <aside class="summary-card">
            <h2>Ваш заказ</h2>
            <div id="checkout-summary">
              <p>Загрузка сводки заказа...</p>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <h3>RMD decor</h3>
        </div>
        <p></p>
      </div>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/checkout.js"></script>
  </body>
</html>
