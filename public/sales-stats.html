<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RMD decor | Статистика продаж</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="/">RMD decor</a>
        <nav class="nav">
          <a href="/">Главная</a>
          <a href="/catalog">Каталог</a>
          <a href="/account">Кабинет</a>
          <a href="/admin">Админ</a>
          <a class="active" href="/sales-stats">Статистика продаж</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Аналитика</p>
            <h1>Статистика продаж</h1>
          </div>
        </div>

        <section class="feature-grid" id="sales-stats-grid">
          <article class="feature-card"><p>Загрузка статистики...</p></article>
        </section>

        <div class="account-layout" style="margin-top: 24px;">
          <section class="orders-card">
            <h2>Топ продаж</h2>
            <div id="top-products-list">
              <div class="empty-state">Загрузка...</div>
            </div>
          </section>

          <section class="orders-card">
            <h2>Статусы заказов</h2>
            <div id="status-stats-list">
              <div class="empty-state">Загрузка...</div>
            </div>
          </section>
        </div>

        <section class="orders-card" style="margin-top: 24px;">
          <h2>Посещаемость страниц</h2>
          <div id="visit-stats-list">
            <div class="empty-state">Загрузка...</div>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <h3>RMD decor</h3>
        </div>
        <p></p>
      </div>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/sales-stats.js"></script>
  </body>
</html>
